<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DroMetaSites builds future-facing websites, conversion systems, and premium launch funnels for ambitious brands."
    />
    <title>DroMetaSites | Future-Built Websites</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <style>
        body {
          margin: 0;
          background:
            radial-gradient(circle at top, rgba(111, 247, 255, 0.12), transparent 28%),
            linear-gradient(180deg, #03050a 0%, #06101d 100%);
          color: #f4f7ff;
          font-family: Inter, sans-serif;
        }

        .boot-shell {
          display: grid;
          place-items: center;
          min-height: 100vh;
          padding: 1.5rem;
        }

        .boot-card {
          width: min(36rem, 100%);
          padding: 2rem;
          border: 1px solid rgba(154, 174, 255, 0.18);
          border-radius: 28px;
          background: rgba(8, 12, 22, 0.9);
          box-shadow: 0 30px 120px rgba(0, 0, 0, 0.55);
        }

        .boot-card p {
          color: #99a4bc;
          line-height: 1.7;
        }

        .boot-kicker {
          color: #6ff7ff;
          font-family: Rajdhani, sans-serif;
          font-size: 0.92rem;
          font-weight: 700;
          letter-spacing: 0.16em;
          text-transform: uppercase;
        }

        .boot-card h1 {
          margin: 0;
          font-family: Orbitron, sans-serif;
          font-size: clamp(2rem, 6vw, 3rem);
          line-height: 1;
          text-transform: uppercase;
        }
      </style>
      <div class="boot-shell">
        <div class="boot-card">
          <p class="boot-kicker">DroMetaSites</p>
          <h1>Loading the experience...</h1>
          <p>
            The site is starting. If this message stays here, the client bundle failed and
            needs another patch, but the page should no longer fall back to a blank white screen.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
